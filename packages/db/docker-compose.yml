services:
  postgres:
    image: postgres:17-alpine
    container_name: memories-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memories
    ports:
      - "5433:5432"
    volumes:
      - memories-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memories"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  memories-pgdata: